data:
  zarr_store: /home/bedartha/public/datasets/as_downloaded/weatherbench2/era5/1959-2023_01_10-6h-240x121_equiangular_with_poles_conservative.zarr
  train_start: 1979-01-01
  train_end: 1979-01-10
  val_start: 2016-01-01
  val_end: 2016-01-03
  test_start: 2018-01-01
  test_end: 2018-01-03
  history_steps: 2
  pressure_vars: [temperature, geopotential, specific_humidity, u_component_of_wind, v_component_of_wind]
  surface_vars: [2m_temperature, 10m_u_component_of_wind, 10m_v_component_of_wind, mean_sea_level_pressure, total_column_water_vapour]
  pressure_levels: [850, 500, 250]

model:
  preset: mini
  embed_dim: 256
  window_size: 8
  num_heads: 6
  depth_pre: 1
  depth_mid: 6
  depth_post: 1
  drop_path_rate: 0.05
  use_checkpoint: true

train:
  max_epochs: 3
  max_iters: 120
  batch_size: 1
  num_workers: 2
  lr: 0.00025
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  patience: 2
  fp16: true

output:
  output_root: results/cascade_tiny
  exp_name: stage_short
  seed: 42

logging:
  tensorboard: false
